
services:
  monitor:
    build: .
    container_name: server-monitor
    restart: always
    ports:
      - "25774:25774"
    volumes:
      - ./data:/app/data
    environment:
      - GIN_MODE=release
      - KOMARI_LISTEN=0.0.0.0:25774
      - KOMARI_DB_TYPE=sqlite
      - KOMARI_DB_FILE=/app/data/monitor.db
      # 首次部署时的管理员账号（仅在数据库无用户时生效）
      # 不设置则默认用户名 admin，密码随机生成（查看容器日志获取）
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=changeme123
      # - KOMARI_CLOUDFLARED_TOKEN=your-token-here
