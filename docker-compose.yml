
services:
  monitor:
    build: .
    container_name: server-monitor
    restart: always
    ports:
      - "25774:25774"
    volumes:
      - ./data:/app/data
    environment:
      - GIN_MODE=release
      - KOMARI_LISTEN=0.0.0.0:25774
      - KOMARI_DB_TYPE=sqlite
      - KOMARI_DB_FILE=/app/data/monitor.db
      # 管理员账号设置（二选一）：
      # 方式一（推荐）：不设置下面两行，首次访问面板时在浏览器中设置
      # 方式二：取消注释并修改为你自己的账号密码
      # - ADMIN_USERNAME=admin
      # - ADMIN_PASSWORD=changeme123
      # - KOMARI_CLOUDFLARED_TOKEN=your-token-here
